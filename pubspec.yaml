name: enhancer
description: "Enhancer - Organize and access study materials, no login required."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend & storage
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.1.0
  firebase_auth: ^5.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10

  # Media
  youtube_player_flutter: ^9.0.4
  syncfusion_flutter_pdfviewer: ^26.1.35

  # Offline downloads (PDFs only)
  path_provider: ^2.1.3
  dio: ^5.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3

  # Ads
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
